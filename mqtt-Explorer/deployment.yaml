apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mqtt-explorer-config-pvc
  namespace: zodiac
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs 
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-explorer
  namespace: zodiac
  labels:
    app: mqtt-explorer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-explorer
  template:
    metadata:
      labels:
        app: mqtt-explorer
    spec:
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ["sh", "-c", "chown -R 1000:1000 /mqtt-explorer/config"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: config-vol
          mountPath: /mqtt-explorer/config
      securityContext:
        # Wir erzwingen User 1000 (Standard für viele Apps)
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      containers:
      - name: mqtt-explorer
        image: smeagolworms4/mqtt-explorer:latest
        ports:
        - containerPort: 4000
        env:
        - name: HTTP_PORT
          value: "4000"
        resources: 
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
        volumeMounts:
        - name: config-vol
          mountPath: /mqtt-explorer/config
      volumes:
      - name: config-vol
        persistentVolumeClaim:
          claimName: mqtt-explorer-config-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-explorer-service
  namespace: zodiac
spec:
  type: NodePort
  selector:
    app: mqtt-explorer
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 30400